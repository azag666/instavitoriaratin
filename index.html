  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">

        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0,react-dom@18.2.0"

</head>
<body class="bg-black">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ChevronLeft, 
      MoreHorizontal, 
      Link as LinkIcon, 
      PlayCircle, 
      Grid3X3, 
      Clapperboard, 
      Repeat2, 
      UserSquare2,
      Play,
      Heart,
      MessageCircle,
      Send,
      Bookmark,
      X
    } from 'lucide-react';

    // ==========================================
    // ✏️ ÁREA DE EDIÇÃO - ALTERE SEUS DADOS AQUI
    // ==========================================
    const PROFILE_DATA = {
      username: "vitorialima",
      name: "Vitória Lima 💖✨",
      avatar: "https://pub-28caac552342447180cf13cbc92a202d.r2.dev/%F0%9F%92%81%F0%9F%8F%BF_%E2%99%80%EF%B8%8F%F0%9F%92%85%F0%9F%8F%BF.jpg",
      stats: {
        posts: "8",
        followers: "42.5K",
        following: "105"
      },
      bio: {
        mentions: "",
        lines: [
          "Criadora de Conteúdo 📸",
          "Acesse meu VIP exclusivo 👇",
          "Conteúdos diários sem censura 🔥"
        ]
      },
      link: {
        url: "https://meuonlyvitorialima.netlify.app/",
        display: "meuonlyvitorialima.netlify.app"
      },
      story: {
        type: "video", 
        media: "https://pub-28caac552342447180cf13cbc92a202d.r2.dev/%F0%9F%92%96%20(1).mp4",
        linkText: "Acessar Conteúdo VIP 🔞",
        linkUrl: "https://meuonlyvitorialima.netlify.app/"
      },
      music: "Vem Me Satisfazer - Sua Música",
      posts: [
        { 
          id: 1, type: 'video', likes: '5.234', caption: 'Um gostinho do que tem lá no VIP... 🔥🤫', url: 'https://pub-28caac552342447180cf13cbc92a202d.r2.dev/%F0%9F%A4%AB.mp4',
          comments: [
            { user: "carlos_edu", avatar: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=150", text: "Assinei o VIP ontem e tô impressionado. Vale cada centavo! 🔥" },
            { user: "rafael.costa", avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150", text: "Que mulher! O VIP tá pegando fogo 🔥🔥" }
          ]
        },
        { 
          id: 2, type: 'video', likes: '4.890', caption: 'Deixando a imaginação rolar... ✨', url: 'https://pub-28caac552342447180cf13cbc92a202d.r2.dev/%F0%9F%99%86%F0%9F%8F%BE_%E2%99%80%EF%B8%8F%23explorepage%E2%9C%A8%20%23fyppp.mp4',
          comments: [
            { user: "marcos.silva99", avatar: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150", text: "Perfeita demais 🤤" }
          ]
        },
        { 
          id: 3, type: 'video', likes: '6.421', caption: 'Vem me ver de pertinho ❤️‍🔥', url: 'https://pub-28caac552342447180cf13cbc92a202d.r2.dev/%F0%9F%A4%AD%23fyp%20%23viralreels.mp4',
          comments: [
            { user: "thiago_rs", avatar: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=150", text: "Muito top! As fotos novas lá no grupo tão demais 😍" }
          ]
        },
        { 
          id: 4, type: 'photo', likes: '3.500', multiple: false, caption: 'Bem brasileira 🇧🇷✨', url: 'https://pub-28caac552342447180cf13cbc92a202d.r2.dev/%40bartiraluzoficial%20%F0%9F%87%A7%F0%9F%87%B7%E2%9C%A8.jpg',
          comments: [
            { user: "andre_luiz", avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150", text: "Já renovei minha assinatura, não fico sem de jeito nenhum 🥵" }
          ]
        },
        { 
          id: 5, type: 'photo', likes: '4.100', multiple: false, caption: 'Dando um trato visual 💁🏽‍♀️💅🏽', url: 'https://pub-28caac552342447180cf13cbc92a202d.r2.dev/%F0%9F%92%81%F0%9F%8F%BF_%E2%99%80%EF%B8%8F%F0%9F%92%85%F0%9F%8F%BF.jpg' 
        },
        { 
          id: 6, type: 'photo', likes: '3.200', multiple: false, caption: 'Um segredinho nosso... 🤫', url: 'https://pub-28caac552342447180cf13cbc92a202d.r2.dev/Let%20me%20be%20your%20favorite%20secret%E2%80%A6%E2%9C%A8%F0%9F%AB%A2.jpg' 
        },
        { 
          id: 7, type: 'photo', likes: '4.890', multiple: false, caption: 'Renovando as energias ☀️🌊', url: 'https://pub-28caac552342447180cf13cbc92a202d.r2.dev/%E2%98%80%EF%B8%8F%F0%9F%8C%8A%F0%9F%90%B3.jpg'
        },
        { 
          id: 8, type: 'video', likes: '5.234', caption: '🔥', url: 'https://pub-28caac552342447180cf13cbc92a202d.r2.dev/%F0%9F%92%96.mp4'
        }
      ]
    };

    function App() {
      const [activeTab, setActiveTab] = useState('grid');
      const [selectedPost, setSelectedPost] = useState(null);
      const [isStoryOpen, setIsStoryOpen] = useState(false);
      const [isFollowing, setIsFollowing] = useState(false);
      const [showMessageModal, setShowMessageModal] = useState(false);

      const handleCloseMiniApp = () => {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.close();
        } else {
          console.log('Fechar Mini App acionado');
        }
      };

      if (selectedPost) {
        return (
          <div className="min-h-screen bg-black text-white font-sans max-w-md mx-auto w-full relative pb-10">
            <div className="flex items-center px-4 py-3 sticky top-0 bg-black z-10 border-b border-gray-900">
              <ChevronLeft size={28} className="cursor-pointer" onClick={() => setSelectedPost(null)} />
              <h1 className="text-xl font-bold ml-6">Posts</h1>
            </div>
            
            <div className="flex items-center justify-between p-3">
              <div className="flex items-center gap-3">
                <div className="bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-500 p-[1.5px] rounded-full">
                  <div className="bg-black p-[1.5px] rounded-full">
                    <img src={PROFILE_DATA.avatar} className="w-8 h-8 rounded-full object-cover" alt="Avatar" />
                  </div>
                </div>
                <span className="font-semibold text-sm">{PROFILE_DATA.username}</span>
              </div>
              <MoreHorizontal size={20} />
            </div>

            <div className="w-full bg-gray-900 flex items-center justify-center relative">
              {selectedPost.type === 'video' ? (
                <video 
                  src={selectedPost.url} 
                  className="w-full max-h-[500px] object-contain bg-black" 
                  controls 
                  autoPlay 
                  playsInline
                  muted // Garantia de funcionamento no celular
                />
              ) : (
                <img 
                  src={selectedPost.url} 
                  className="w-full max-h-[500px] object-contain" 
                  alt="Post content" 
                />
              )}
            </div>

            <div className="p-3">
              <div className="flex justify-between items-center mb-3">
                <div className="flex gap-4">
                  <Heart size={26} className="text-red-500 cursor-pointer hover:scale-110 transition-transform" fill="currentColor" />
                  <MessageCircle size={26} className="cursor-pointer hover:scale-110 transition-transform" />
                  <Send size={26} className="cursor-pointer hover:scale-110 transition-transform" />
                </div>
                <Bookmark size={26} className="cursor-pointer hover:scale-110 transition-transform" />
              </div>
              
              <div className="font-semibold text-sm mb-2">{selectedPost.likes || '1.243'} curtidas</div>
              
              <div className="text-sm mb-3">
                <span className="font-semibold mr-2">{PROFILE_DATA.username}</span>
                {selectedPost.caption}
              </div>

              {selectedPost.comments && selectedPost.comments.length > 0 && (
                <div className="mt-4 pt-4 border-t border-gray-900">
                  <h3 className="font-semibold text-sm mb-4 text-gray-400">Comentários de assinantes</h3>
                  <div className="flex flex-col gap-4">
                    {selectedPost.comments.map((comment, i) => (
                      <div key={i} className="flex gap-3">
                        <img src={comment.avatar} className="w-8 h-8 rounded-full object-cover mt-1" alt={comment.user} />
                        <div className="flex flex-col">
                          <span className="text-sm font-semibold">{comment.user}</span>
                          <span className="text-sm text-gray-200">{comment.text}</span>
                          <span className="text-xs text-gray-500 mt-1 cursor-pointer">Responder</span>
                        </div>
                        <Heart size={14} className="ml-auto mt-2 text-gray-500 cursor-pointer hover:text-red-500" />
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      if (isStoryOpen) {
        return (
          <div className="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center max-w-md mx-auto w-full">
            <div className="absolute top-0 w-full p-4 flex justify-between items-center z-10 bg-gradient-to-b from-black/60 to-transparent">
              <div className="flex items-center gap-2">
                <img src={PROFILE_DATA.avatar} className="w-8 h-8 rounded-full border border-gray-500 object-cover" alt="Avatar" />
                <span className="text-white font-semibold text-sm">{PROFILE_DATA.username}</span>
                <span className="text-gray-300 text-xs ml-1">2 h</span>
              </div>
              <X size={28} className="text-white cursor-pointer drop-shadow-md" onClick={() => setIsStoryOpen(false)} />
            </div>

            {PROFILE_DATA.story.type === 'video' ? (
              <video 
                src={PROFILE_DATA.story.media} 
                className="w-full h-full object-cover" 
                autoPlay 
                playsInline 
                loop
                muted // Adicionado para garantir autoplay no iOS e Android
              />
            ) : (
              <img src={PROFILE_DATA.story.media} className="w-full h-full object-cover" alt="Story content" />
            )}

            <a
              href={PROFILE_DATA.story.linkUrl}
              target="_blank"
              rel="noopener noreferrer"
              className="absolute bottom-24 bg-white/95 text-black px-6 py-3 rounded-full font-bold flex items-center gap-2 shadow-xl hover:scale-105 transition-transform"
            >
              <div className="bg-blue-100 p-1.5 rounded-full">
                <LinkIcon size={18} className="-rotate-45 text-blue-600" />
              </div>
              {PROFILE_DATA.story.linkText}
            </a>
          </div>
        );
      }

      let displayedPosts = [];
      if (activeTab === 'grid') {
        displayedPosts = PROFILE_DATA.posts.filter(p => !p.isTagged);
      } else if (activeTab === 'reels') {
        displayedPosts = PROFILE_DATA.posts.filter(p => p.type === 'video' && !p.isTagged);
      } else if (activeTab === 'tagged') {
        displayedPosts = PROFILE_DATA.posts.filter(p => p.isTagged);
      }

      return (
        <div className="min-h-screen bg-black text-white font-sans max-w-md mx-auto w-full relative pb-10">
          <div className="flex justify-between items-center px-4 py-3 sticky top-0 bg-black z-10">
            <div className="flex items-center gap-6">
              <ChevronLeft size={28} className="cursor-pointer" onClick={handleCloseMiniApp} />
              <h1 className="text-xl font-bold">{PROFILE_DATA.username}</h1>
            </div>
            <MoreHorizontal size={24} className="cursor-pointer" onClick={() => setShowMessageModal(true)} />
          </div>

          <div className="px-4 pt-2">
            <div className="flex justify-between items-center mb-4">
              <div className="relative cursor-pointer hover:scale-105 transition-transform" onClick={() => setIsStoryOpen(true)}>
                <div className="w-22 h-22 rounded-full p-[2px] bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-500">
                  <div className="bg-black p-[2px] rounded-full">
                    <img 
                      src={PROFILE_DATA.avatar} 
                      alt="Profile" 
                      className="w-20 h-20 rounded-full object-cover"
                    />
                  </div>
                </div>
              </div>

              <div className="flex gap-6 text-center flex-1 justify-center ml-4">
                <div className="flex flex-col items-center">
                  <span className="font-bold text-lg">{PROFILE_DATA.stats.posts}</span>
                  <span className="text-sm text-gray-100">posts</span>
                </div>
                <div className="flex flex-col items-center">
                  <span className="font-bold text-lg">{PROFILE_DATA.stats.followers}</span>
                  <span className="text-sm text-gray-100">seguidores</span>
                </div>
                <div className="flex flex-col items-center">
                  <span className="font-bold text-lg">{PROFILE_DATA.stats.following}</span>
                  <span className="text-sm text-gray-100">seguindo</span>
                </div>
              </div>
            </div>

            <div className="flex flex-col gap-0.5 mb-4">
              <h2 className="font-bold text-[15px]">{PROFILE_DATA.name}</h2>
              {PROFILE_DATA.bio.mentions ? (
                <p className="text-blue-200 text-[15px]">{PROFILE_DATA.bio.mentions}</p>
              ) : null}
              {PROFILE_DATA.bio.lines.map((line, index) => (
                <p key={index} className="text-[15px]">{line}</p>
              ))}
              <p className="text-gray-400 text-[15px] cursor-pointer">... mais</p>
              
              <a href={PROFILE_DATA.link.url} target="_blank" rel="noopener noreferrer" className="flex items-center gap-1 mt-1 text-blue-200 text-[15px] font-medium hover:underline">
                <LinkIcon size={16} className="-rotate-45" />
                {PROFILE_DATA.link.display}
              </a>

              {PROFILE_DATA.music ? (
                <div className="flex items-center gap-2 mt-2 text-sm font-medium">
                  <PlayCircle size={16} fill="white" className="text-black" />
                  <span>{PROFILE_DATA.music}</span>
                </div>
              ) : null}
            </div>

            <div className="flex gap-2 mb-6">
              <button 
                onClick={() => setIsFollowing(!isFollowing)}
                className={`flex-1 font-semibold py-1.5 rounded-lg text-sm transition-colors ${
                  isFollowing 
                    ? 'bg-[#262626] hover:bg-[#333333] text-white' 
                    : 'bg-[#005CFF] hover:bg-blue-600 text-white'
                }`}
              >
                {isFollowing ? 'Seguindo' : 'Seguir'}
              </button>
              <button 
                onClick={() => setShowMessageModal(true)}
                className="flex-1 bg-[#262626] hover:bg-[#333333] text-white font-semibold py-1.5 rounded-lg text-sm transition-colors"
              >
                Mensagem
              </button>
            </div>
          </div>

          <div className="flex border-t border-gray-800">
            <button 
              onClick={() => setActiveTab('grid')}
              className={`flex-1 flex justify-center py-3 border-b-2 transition-colors ${activeTab === 'grid' ? 'border-white text-white' : 'border-transparent text-gray-500'}`}
            >
              <Grid3X3 size={24} />
            </button>
            <button 
              onClick={() => setActiveTab('reels')}
              className={`flex-1 flex justify-center py-3 border-b-2 transition-colors ${activeTab === 'reels' ? 'border-white text-white' : 'border-transparent text-gray-500'}`}
            >
              <Clapperboard size={24} />
            </button>
            <button 
              onClick={() => setActiveTab('threads')}
              className={`flex-1 flex justify-center py-3 border-b-2 transition-colors ${activeTab === 'threads' ? 'border-white text-white' : 'border-transparent text-gray-500'}`}
            >
              <Repeat2 size={24} />
            </button>
            <button 
              onClick={() => setActiveTab('tagged')}
              className={`flex-1 flex justify-center py-3 border-b-2 transition-colors ${activeTab === 'tagged' ? 'border-white text-white' : 'border-transparent text-gray-500'}`}
            >
              <UserSquare2 size={24} />
            </button>
          </div>

          <div className="grid grid-cols-3 gap-0.5">
            {displayedPosts.map((post) => (
              <div 
                key={post.id} 
                className="relative aspect-square bg-gray-900 group cursor-pointer"
                onClick={() => setSelectedPost(post)}
              >
                {post.type === 'video' ? (
                  <video 
                    src={`${post.url}#t=0.1`}  
                    className="w-full h-full object-cover group-hover:opacity-90 transition-opacity pointer-events-none" 
                    preload="metadata"
                    muted
                    playsInline
                  />
                ) : (
                  <img 
                    src={post.url} 
                    alt={`Post ${post.id}`} 
                    className="w-full h-full object-cover group-hover:opacity-90 transition-opacity"
                  />
                )}
                
                {post.type === 'video' && (
                  <div className="absolute top-2 right-2">
                    <Play fill="white" size={16} className="text-white drop-shadow-md" />
                  </div>
                )}

                {post.multiple && (
                  <div className="absolute top-2 right-2">
                     <svg aria-label="Carrossel" fill="currentColor" height="16" role="img" viewBox="0 0 48 48" width="16" className="drop-shadow-md"><path d="M34.8 29.7V11c0-2.9-2.3-5.2-5.2-5.2H11c-2.9 0-5.2 2.3-5.2 5.2v18.7c0 2.9 2.3 5.2 5.2 5.2h18.7c2.8-.1 5.1-2.4 5.1-5.2zM39.2 15v16.1c0 4.5-3.7 8.2-8.2 8.2H14.9c-.6 0-.9.7-.5 1.1 1.6 1.5 3.7 2.4 6 2.4h13.4c5.5 0 9.9-4.5 9.9-9.9V17.9c0-2.3-.9-4.4-2.4-6-.4-.4-1.1-.2-1.1.5z"></path></svg>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Modal de Mensagem / VIP */}
          {showMessageModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/80" onClick={() => setShowMessageModal(false)}></div>
              <div className="bg-[#262626] rounded-xl w-full max-w-sm p-6 text-center shadow-2xl border border-gray-800 relative z-10">
                <button 
                  onClick={() => setShowMessageModal(false)}
                  className="absolute top-3 right-3 text-gray-400 hover:text-white transition-colors"
                >
                  <X size={20} />
                </button>
                <div className="mx-auto w-12 h-12 bg-blue-500/20 rounded-full flex items-center justify-center mb-4">
                  <MessageCircle size={24} className="text-[#005CFF]" />
                </div>
                <h3 className="text-lg font-bold text-white mb-2">Modelo Verificada ✨</h3>
                <p className="text-sm text-gray-300 mb-6">
                  O chat privado é liberado apenas para assinantes do VIP. Acesse o link para desbloquear o chat exclusivo e muito mais! 🔥
                </p>
                <a 
                  href={PROFILE_DATA.link.url}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="block w-full bg-[#005CFF] hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition-colors"
                >
                  Acessar VIP agora
                </a>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Inicializa a aplicação React
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
